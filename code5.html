<!DOCTYPE html>
<html>
<head>
<title>Meme Knowledge Intelligence Platform</title>

<style>
:root {
  --box: rgba(20,20,20,0.35);
  --btn: #d4af37;
  --text: #f5f5f5;
}

body{
  margin:0;
  font-family:"Segoe UI",sans-serif;
  color:var(--text);
  overflow-x:hidden;
  text-align:center;
}

/* 3D LOGIN BACKGROUND */
.bg-layer{
  position:fixed;
  width:120vw;
  height:120vh;
  background:url("https://news.mit.edu/sites/default/files/styles/news_article__image_gallery/public/images/201706/MIT-Label-Neurons_0.jpg?itok=wEL5x88s");
  background-size:cover;
  background-position:center;
  z-index:-2;
  transition: transform 0.2s;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

.box{
  margin:60px auto;
  padding:25px;
  width:360px;
  background:var(--box);
  backdrop-filter:blur(25px);
  border-radius:20px;
  box-shadow:0 30px 80px rgba(0,0,0,0.8);
}

input,button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}

input{
  background:rgba(255,255,255,0.2);
  color:white;
}

/* HOME */
#homePage{display:none}

.bg-move{
  position:fixed;
  width:200%;
  height:100%;
  background:url("https://static.vecteezy.com/system/resources/previews/003/103/157/non_2x/blue-neon-digital-portal-with-particles-and-shiny-rings-in-dark-room-vector.jpg");
  background-size:cover;
  z-index:-3;
  animation:move3d 20s linear infinite alternate;
}

@keyframes move3d{
  0%{transform:translateX(0) scale(1.1);}
  100%{transform:translateX(-20%) scale(1.15);}
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

.nav-left{display:flex;gap:10px;}

.nav button{
  padding:6px 10px;
  font-size:12px;
  background:linear-gradient(45deg,#3b82f6,#9333ea);
  color:white;
}

/* MENU DROPDOWN */
.menu{position:relative;cursor:pointer;}
.dropdown{
  display:none;
  position:absolute;
  right:0;
  background:black;
  padding:10px;
  border-radius:10px;
}
.menu:hover .dropdown{display:block;}

/* EDIT DROPDOWN */
.edit-dropdown{
  display:none;
  position:absolute;
  right:0;
  background:#111;
  padding:10px;
  border-radius:10px;
}
.menu:hover .edit-dropdown{display:block;}

/* PROFILE */
.center-box{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  padding:20px;
  border-radius:12px;
  display:none;
}

/* SEARCH PANEL */
.search-panel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:320px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);
  box-shadow:0 0 25px rgba(0,255,255,0.4);
  transition:0.4s;
  animation:float 4s ease-in-out infinite;
}

.search-panel:hover{
  box-shadow:0 0 40px rgba(0,255,255,0.8);
}

@keyframes float{
  0%,100%{transform:translate(-50%,-50%) translateY(0);}
  50%{transform:translate(-50%,-50%) translateY(-10px);}
}

/* SUGGESTIONS */
.suggestions{
  background:black;
  border-radius:10px;
  margin-top:5px;
  text-align:left;
  max-height:120px;
  overflow:auto;
}

/* HISTORY */
.history{
  margin-top:10px;
  text-align:left;
  font-size:12px;
}

/* POPUP */
.popup{
  position:fixed;
  top:20px;
  right:20px;
  background:green;
  padding:10px;
  display:none;
}

.search-container {
  display: flex;
  align-items: center;
  background: #0f172a;
  border-radius: 40px;
  padding: 8px;
  box-shadow: 0 0 15px rgba(0,255,255,0.2);
  margin-bottom: 10px;
}

/* BIG SEARCH BAR */
.search-container input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: white;
  font-size: 18px;
  padding: 12px 15px;
}

/* SMALL SCAN BUTTON */
.scan-btn {
  border: none;
  background: cyan;
  color: black;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.scan-btn:hover {
  transform: scale(1.1);
  background: #00ffff;
}
</style>
</head>

<body>

<div id="loginPage">
  <div id="bg1" class="bg-layer"></div>
  <div class="overlay"></div>

  <h1>✨ Meme Knowledge Intelligence Platform</h1>

  <div class="box" id="box">
    <button onclick="showLogin()">Login</button>
    <button onclick="showSignup()">Sign Up</button>
    <div id="form"></div>
  </div>
</div>

<div id="homePage">
<div class="bg-move"></div>
<div class="overlay"></div>

<div class="nav">
  <div class="nav-left">
    <button onclick="showHome()">🏠</button>
    <button onclick="showProfile()">👤</button>
  </div>

  <div class="menu">👤

    <!-- EDIT -->
    <div class="edit-dropdown">
      <button onclick="editProfile()">✏ Edit</button>
      <div id="editBox"></div>
    </div>

    <!-- LOGOUT -->
    <div class="dropdown">
      <button onclick="logout()" style="font-size:10px;padding:4px;">Logout</button>
    </div>

  </div>
</div>

<div class="center-box" id="centerBox"></div>

<!-- SEARCH PANEL -->
<div class="search-panel" id="searchPanel">
  <h3>🔍 Meme Hunter</h3>

  <div class="search-container">
    <input id="search" placeholder="Search memes, #hashtags..." oninput="showSuggestions()">
    <button class="scan-btn" onclick="goToScan()">📸</button>
  </div>

  <!-- ✅ ADD THIS LINE -->
  <input type="file" id="memeUpload">

  <button onclick="searchMeme()">Search 🔄</button>

  <div id="suggestions" class="suggestions"></div>
  <div id="results"></div>

  <div class="history">
    <h4>History</h4>
    <div id="historyList"></div>
    <button onclick="clearHistory()">Clear History</button>
  </div>
</div>

<h1>🏴‍☠️ Meme Treasure Explorer</h1>
</div>

<div id="popup" class="popup"></div>

<script>

let suggestionsList=[
"instagram meme","facebook meme","twitter meme","snapchat meme",
"ai generated meme","funny meme","viral meme"
];

/* LOGIN BACKGROUND 3D */
document.addEventListener("mousemove",(e)=>{
  let x=(window.innerWidth/2-e.clientX)/30;
  let y=(window.innerHeight/2-e.clientY)/30;
  bg1.style.transform=`translate(${x}px,${y}px) scale(1.1)`;
});

/* FORMS */
function showLogin(){
  form.innerHTML=`
  <input id="loginUser" placeholder="Name">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>`;
}

function showSignup(){
  form.innerHTML=`
  <input id="user" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Phone">
  <input id="dob" type="date" onchange="calcAge()">
  <input id="age" placeholder="Age" readonly>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>`;
}

function calcAge(){
  let dobVal=new Date(dob.value);
  let diff=Date.now()-dobVal.getTime();
  let ageDate=new Date(diff);
  age.value=Math.abs(ageDate.getUTCFullYear()-1970);
}

/* SIGNUP */
function signup(){
  localStorage.setItem("name",user.value);
  localStorage.setItem("email",email.value);
  localStorage.setItem("phone",phone.value);
  localStorage.setItem("dob",dob.value);
  localStorage.setItem("age",age.value);
  localStorage.setItem("pass",pass.value);

  showPopup("Account Created! Please login.");
  showLogin();
}

/* LOGIN */
function login(){
  if(localStorage.getItem("name")===loginUser.value &&
     localStorage.getItem("pass")===loginPass.value){
    localStorage.setItem("loggedIn","true");
    goHome();
  } else showPopup("Invalid Credentials");
}

function goHome(){
  setTimeout(()=>{
    loginPage.style.display="none";
    homePage.style.display="block";
  },800);
}

/* ENTER KEY */
document.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    if(document.getElementById("loginUser")) login();
    if(document.getElementById("user")) signup();
  }
});

/* PROFILE */
function showProfile(){
  centerBox.innerHTML=`
  <b>Credentials</b><br>
  Name: ${localStorage.getItem("name")}<br>
  Email: ${localStorage.getItem("email")}<br>
  Phone: ${localStorage.getItem("phone")}<br>
  Password: ${localStorage.getItem("pass")}
  `;
  centerBox.style.display="block";
}

function showHome(){centerBox.style.display="none";}

/* EDIT PROFILE */
function editProfile(){
  editBox.innerHTML=`
  <input id="newName" placeholder="New Name">
  <input id="newEmail" placeholder="New Email">
  <input id="newPass" type="password" placeholder="New Password">
  <button onclick="saveEdit()">Save</button>
  `;
}

function saveEdit(){
  localStorage.setItem("name",newName.value);
  localStorage.setItem("email",newEmail.value);
  localStorage.setItem("pass",newPass.value);
  showPopup("Updated!");
}

/* SEARCH */
function searchMeme(){
  let val=search.value;
  addHistory(val);

  results.innerHTML=`<img src="https://source.unsplash.com/400x300/?${val},meme">`;
}
function goToScan(){

  let file = document.getElementById("memeUpload").files[0];

  if(!file){
    results.innerHTML = "⚠️ Upload a meme first!";
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    localStorage.setItem("memeImage", e.target.result);

    // 🚀 redirect to scan page
    window.location.href = "scan.html";
  };

  reader.readAsDataURL(file);
}

/* REFRESH */
function refreshSearch(){
  searchMeme();
}

function scanMeme(){
  let val = search.value;

  if(!val){
    results.innerHTML = "⚠️ Enter a meme to scan!";
    return;
  }

  results.innerHTML = `
    <div style="padding:10px;color:cyan;">🔍 Scanning "${val}"...</div>
  `;

  setTimeout(()=>{
    results.innerHTML = `
      <div style="padding:10px;">
        <h4>📸 Scan Result</h4>
        <p><b>${val}</b></p>
        <p>🤖 AI Analysis: This meme represents a trending internet emotion or cultural reaction.</p>
      </div>
    `;
  },1200);
}

/* SUGGESTIONS */
function showSuggestions(){
  let val=search.value.toLowerCase();
  let filtered=suggestionsList.filter(s=>s.includes(val));
  suggestions.innerHTML=filtered.map(s=>`<div onclick="selectSuggestion('${s}')">${s}</div>`).join("");
}

function selectSuggestion(val){
  search.value=val;
  suggestions.innerHTML="";
}

/* HISTORY */
function addHistory(val){
  if(!val) return;
  let history=JSON.parse(localStorage.getItem("history")||"[]");
  history.unshift(val);
  localStorage.setItem("history",JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  let history=JSON.parse(localStorage.getItem("history")||"[]");
  historyList.innerHTML=history.map(h=>`<div>${h}</div>`).join("");
}

function clearHistory(){
  localStorage.removeItem("history");
  renderHistory();
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("loggedIn");
  location.reload();
}

/* POPUP */
function showPopup(msg){
  popup.innerText=msg;
  popup.style.display="block";
  setTimeout(()=>popup.style.display="none",2000);
}

/* INIT */
window.onload=()=>{
  box.classList.add("show");
  renderHistory();
  if(localStorage.getItem("loggedIn")==="true"){
    loginPage.style.display="none";
    homePage.style.display="block";
  }
};

</script>

</body>
</html>
